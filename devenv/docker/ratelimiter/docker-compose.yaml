services:
  grafana:
    image: grafana/grafana:latest@sha256:d13597b9aa4b5be09cd63f1acc844b31b7d9f0ab76e33ec2891429573316a2a6
    ports:
      - 3000:3000
    environment:
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_LOG_FILTERS: rendering:debug
  renderer:
    image: grafana/grafana-image-renderer:latest@sha256:ad45676a30678ffb922399b48b076f800c4167b8feb8343b8f87f4a9a30aacd6
    ports:
      - 8081
    volumes:
      - ./config.json:/usr/src/app/config.json
  redis:
    image: redis:latest@sha256:b0efb06f6b4d8c1e2fd1b7c1e89e178d787b432b7b09286b4e7ea3dcdbac777a
    ports:
      - 6379


